version: '3.7'
services:
  deluge:
    image: linuxserver/deluge:latest
    container_name: deluge
    restart: unless-stopped
    network_mode: "host"
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=Europe/Paris
    volumes:
      - /home/media/deluge/config:/config
      - ${PATH_MEDIA}:/home/media/data/downloads
      - ${PATH_MEDIA}:/home/media/data/

  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=Europe/Paris
      - WEBUI_PORT=8080
      - TORRENTING_PORT=6881
    volumes:
      - /home/media/deluge/config:/config
      - ${PATH_MEDIA}:/home/media/data/downloads
      - ${PATH_MEDIA}:/home/media/data/*
    ports:
      - 8080:8080
      - 6881:6881
      - 6881:6881/udp
    restart: unless-stopped
  
  ygg-rss-proxy:
    image: ghcr.io/limedrive/ygg-rss-proxy:latest
    container_name: ygg-rss-proxy
    expose:
      - 8080
    environment:
      TZ: Europe/Paris
      YGG_USER: 'julpshady'
      YGG_PASS: 'B1p1n>>)h*)[ydhs=QN5'
      FLARESOLVERR_HOST: flaresolverr
      RSS_HOST: ygg-rss-proxy
      RSS_PORT: 8080
      LOG_LEVEL: INFO
    volumes:
      - ./config:/app/config
    restart: unless-stopped
    depends_on:
      - flaresolverr

  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    restart: unless-stopped
    network_mode: "host"
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=Europe/Paris
    volumes:
      - /home/media/prowlarr/config:/config
      - /etc/localtime:/etc/localtime:ro
    ports:
      - 9696:9696

  sonarr:
    image: linuxserver/sonarr:latest
    container_name: sonarr
    restart: unless-stopped
    network_mode: "host"
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=Europe/Paris
    volumes:
      - /home/media/sonarr/config:/config
      - ${PATH_MEDIA}:/home/media/data/
      - ${PATH_MEDIA}:/home/media/data/downloads

  radarr:
    image: linuxserver/radarr:latest
    container_name: radarr
    restart: unless-stopped
    network_mode: "host"
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=Europe/Paris
    volumes:
      - /home/media/radarr/config:/config
      - ${PATH_MEDIA}:/home/media/data/
      - ${PATH_MEDIA}:/home/media/data/downloads

  lidarr:
    image: linuxserver/lidarr:latest
    container_name: lidarr
    restart: unless-stopped
    network_mode: "host"
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=Europe/Paris
    volumes:
      - /home/media/lidarr/config:/config
      - ${PATH_MEDIA}:/home/media/data/

  plex:
    image: linuxserver/plex:latest
    container_name: plex
    restart: unless-stopped
    network_mode: "host"
    environment:
      - VERSION=latest
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=Europe/Paris
    volumes:
      - /home/media/config:/config
      - ${PATH_MEDIA}:/home/media/data

  flaresolverr:
    # DockerHub mirror flaresolverr/flaresolverr:latest
    image: ghcr.io/flaresolverr/flaresolverr:latest
    container_name: flaresolverr
    environment:
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - LOG_HTML=${LOG_HTML:-false}
      - CAPTCHA_SOLVER=${CAPTCHA_SOLVER:-none}
      - TZ=Europe/London
      - LANG=en_GB
    ports:
      - "${PORT:-8191}:8191"
    restart: unless-stopped

  # https://hub.docker.com/r/itsthenetwork/nfs-server-alpine
  nfs:
    image: itsthenetwork/nfs-server-alpine:12
    container_name: nfs
    restart: unless-stopped
    privileged: true
    environment:
      - SHARED_DIRECTORY=/home/media/data/
    volumes:
      - /data/nfs-storage:/home/media/data/
    ports:
      - 2049:2049