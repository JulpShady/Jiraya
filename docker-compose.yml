version: '3.7'
services:
  deluge:
    image: linuxserver/deluge:latest
    container_name: deluge
    restart: unless-stopped
    network_mode: "host"
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=Europe/Paris
    volumes:
      - /home/media/deluge/config:/config
      - ${PATH_MEDIA}:/home/media/data/downloads
      - ${PATH_MEDIA}:/home/media/data/
  
  ygege:
      image: uwucode/ygege:latest
      container_name: ygege
      restart: unless-stopped
      # Optional: Run with specific user ID (already runs as non-root UID 10001 by default)
      # user: "1000:1000"
      environment:
        BIND_IP: "0.0.0.0"                                     # Optional: IP to bind (default: 0.0.0.0)
        BIND_PORT: "8715"                                    # Optional: Internal port (default: 8715)
        LOG_LEVEL: "info"                                    # Optional: Log level (default: info)
        # TMDB_TOKEN: "your_token"                             # Optional: TMDB API token for IMDB/TMDB lookups
        RELAY_URL: "wss://relay.ygg.gratis"                  # Optional: Nostr relay URL (default: wss://relay.ygg.gratis)
      volumes:
        - ./ygege/config.json:/app/config.json:ro # Optional: read-only config file
      ports:
        - "8715:8715"                            # Change CONTAINER_PORT to match BIND_PORT env var
      healthcheck:
        test: ["CMD-SHELL", "curl --fail http://localhost:$${BIND_PORT:-8715}/health || exit 1"]
        interval: 1m30s
        timeout: 20s
        retries: 3
        start_period: 10s

  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Paris
      - WEBUI_PORT=8181
      - TORRENTING_PORT=6881
    volumes:
      - /home/media/qbittorrent/config:/config
      - ${PATH_MEDIA}:/home/media/data/downloads
      - ${PATH_MEDIA}:/home/media/data/
    ports:
      - 8181:8181
      - 6881:6881
      - 6881:6881/udp
    restart: unless-stopped

  prowlarr:
    image: ghcr.io/almottier/prowlarr-ygg
    # lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    restart: unless-stopped
    network_mode: "host"
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=Europe/Paris
    volumes:
      - /home/media/prowlarr/config:/config
      - /etc/localtime:/etc/localtime:ro
      #- ./Partage/*:/config/Definitions/Custom/:ro
    ports:
      - 9696:9696

  sonarr:
    image: linuxserver/sonarr:latest
    container_name: sonarr
    restart: unless-stopped
    network_mode: "host"
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=Europe/Paris
    volumes:
      - /home/media/sonarr/config:/config
      - ${PATH_MEDIA}:/home/media/data/
      - ${PATH_MEDIA}:/home/media/data/downloads

  radarr:
    image: linuxserver/radarr:latest
    container_name: radarr
    restart: unless-stopped
    network_mode: "host"
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=Europe/Paris
    volumes:
      - /home/media/radarr/config:/config
      - ${PATH_MEDIA}:/home/media/data/
      - ${PATH_MEDIA}:/home/media/data/downloads

  lidarr:
    image: linuxserver/lidarr:latest
    container_name: lidarr
    restart: unless-stopped
    network_mode: "host"
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=Europe/Paris
    volumes:
      - /home/media/lidarr/config:/config
      - ${PATH_MEDIA}:/home/media/data/

  plex:
    image: linuxserver/plex:latest
    container_name: plex
    restart: unless-stopped
    network_mode: "host"
    environment:
      - VERSION=latest
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=Europe/Paris
    volumes:
      - /home/media/config:/config
      - ${PATH_MEDIA}:/home/media/data

  flaresolverr:
    # DockerHub mirror flaresolverr/flaresolverr:latest
    image: 21hsmw/flaresolverr:nodriver
    # alexfozor/flaresolverr:pr-1300-experimental
    # 21hsmw/flaresolverr:nodriver
    # ghcr.io/flaresolverr/flaresolverr:latest
    container_name: flaresolverr
    environment:
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - LOG_HTML=${LOG_HTML:-false}
      - CAPTCHA_SOLVER=${CAPTCHA_SOLVER:-none}
      - TZ=Europe/paris
      - LANG=fr_FR
    ports:
      - "${PORT:-8191}:8191"
    restart: unless-stopped
